name: Deploy with Client Secret (Legacy - for comparison only)

on:
  workflow_dispatch:

jobs:
  test-legacy-login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login via Client Secret
        uses: azure/login@v2
        with:
          client-id: 841951c2-ab37-4b92-82ea-8df46a8d626c
          tenant-id: 529d69d4-e6ac-4af1-a97d-b3a621b09701
          subscription-id: a220474d-65d9-484b-8d3c-4fd5bd5ca6bf
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Read secret from Key Vault
        run: |
          az keyvault secret show --vault-name kv-hanqin-iam-proj --name lab-iam-sec001 --query value -o tsv
